<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIELIT Official CBT - Kaushal Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://harshitkaushal9129-bit.github.io/O-level-mcqs-practice/mcqs.png">
    
    <meta name="theme-color" content="#003366">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NIELIT Shapes */
        .q-btn { width: 35px; height: 35px; font-size: 12px; font-weight: 700; border: 1px solid #cbd5e1; cursor: pointer; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .q-answered { background: #16a34a !important; color: white !important; clip-path: polygon(0% 20%, 20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%); border: none; }
        .q-not-answered { background: #dc2626 !important; color: white !important; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); border: none; }
        .q-marked { background: #7c3aed !important; color: white !important; border-radius: 50% !important; border: none; }
        .q-current { border: 3px solid #0f172a !important; transform: scale(1.1); z-index: 10; box-shadow: 0 0 8px rgba(0,0,0,0.2); }

        /* Scrollbar Fix */
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Layout Fixes */
        .opt-label { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 15px; cursor: pointer; display: flex; align-items: center; background: #fff; transition: 0.2s; gap: 10px; width: 100%; }
        .opt-input:checked + .opt-label { background: #eff6ff; border-color: #2563eb; color: #1e40af; }

        .hide { display: none !important; }

        /* Bottom Nav Fix for Mobile */
        .nav-footer { background: #fff; border-top: 1px solid #e2e8f0; padding: 10px; display: flex; justify-content: space-between; align-items: center; gap: 8px; shrink: 0; }
        .btn-action { padding: 10px 15px; border-radius: 6px; font-weight: 700; font-size: 11px; text-transform: uppercase; color: white; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <header class="bg-[#003366] text-white p-3 flex justify-between items-center shrink-0 border-b-4 border-orange-500">
        <div class="flex items-center gap-2">
            <img src="https://harshitkaushal9129-bit.github.io/O-level-mcqs-practice/mcqs.png" class="h-8 bg-white p-1 rounded">
            <h1 class="text-xs font-bold uppercase hidden sm:block">NIELIT Exam <span class="text-orange-400">| Kaushal Institute</span></h1>
        </div>
        <div id="exam-timer" class="bg-black/30 px-4 py-1 rounded-full font-mono text-lg font-bold text-orange-400 border border-white/20">90:00</div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        
        <!-- Login UI -->
        <section id="login-ui" class="absolute inset-0 z-[100] bg-slate-100 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl p-6 text-center">
                <div class="text-[#003366] mb-4"><i class="fas fa-user-circle text-5xl"></i></div>
                <h2 class="text-xl font-bold mb-4 uppercase">Candidate Login</h2>
                <input type="text" id="cand-name" class="w-full border-2 p-3 rounded-lg mb-4 outline-none focus:border-blue-500 font-semibold" placeholder="Enter Full Name">
                <button onclick="login()" class="w-full bg-[#ff9933] text-white py-3 rounded-lg font-bold shadow-lg uppercase">Start Exam</button>
            </div>
        </section>

        <!-- Module Selection -->
        <section id="module-ui" class="hide absolute inset-0 z-[90] bg-slate-50 p-4 overflow-y-auto custom-scroll">
            <div class="max-w-2xl mx-auto space-y-4">
                <h2 class="text-xl font-black text-slate-800 uppercase text-center py-4">Select Paper</h2>
                <div id="step-1" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <button onclick="selectMod('M1')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600 text-left">
                        <span class="block font-bold">M1-R5</span>
                        <span class="text-xs text-slate-500">IT Tools & Basics</span>
                    </button>
                    <button onclick="selectMod('M2')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-600 text-left">
                        <span class="block font-bold">M2-R5</span>
                        <span class="text-xs text-slate-500">Web Designing</span>
                    </button>
                    <button onclick="selectMod('M3')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-600 text-left">
                        <span class="block font-bold">M3-R5</span>
                        <span class="text-xs text-slate-500">Python Programming</span>
                    </button>
                    <button onclick="selectMod('M4')" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-600 text-left">
                        <span class="block font-bold">M4-R5</span>
                        <span class="text-xs text-slate-500">IoT (Internet of Things)</span>
                    </button>
                </div>
                <div id="step-2" class="hide bg-white p-6 rounded-xl shadow-md text-center">
                    <p class="font-bold mb-4">Questions Count</p>
                    <div class="flex flex-wrap justify-center gap-2">
                        <button onclick="startExam(25)" class="px-6 py-2 border-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white">25</button>
                        <button onclick="startExam(50)" class="px-6 py-2 border-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white">50</button>
                        <button onclick="startExam(100)" class="px-6 py-2 border-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white">100</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Exam UI -->
        <section id="exam-ui" class="hide flex flex-col md:flex-row h-full w-full bg-white overflow-hidden">
            <!-- Left Side: Questions -->
            <div class="flex-1 flex flex-col h-full overflow-hidden border-r">
                <div class="bg-slate-50 px-4 py-2 text-[10px] font-bold flex justify-between border-b">
                    <span id="display-mod" class="text-blue-800"></span>
                    <span id="display-idx"></span>
                </div>
                <div class="flex-1 overflow-y-auto p-4 sm:p-8 custom-scroll">
                    <div class="max-w-3xl mx-auto">
                        <h2 id="q-text" class="text-base sm:text-xl font-bold text-slate-800 mb-6 leading-snug"></h2>
                        <div id="opt-container" class="space-y-3"></div>
                    </div>
                </div>
                <footer class="nav-footer">
                    <div class="flex gap-1">
                        <button onclick="move(-1)" class="btn-action bg-slate-500"><i class="fas fa-arrow-left"></i> Prev</button>
                        <button onclick="markReview()" class="btn-action bg-purple-600"><i class="fas fa-bookmark"></i> Review</button>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="move(1)" id="next-btn" class="btn-action bg-green-600">Next <i class="fas fa-arrow-right"></i></button>
                        <button onclick="submitExam()" id="submit-btn" class="hide btn-action bg-red-600">Submit</button>
                    </div>
                </footer>
            </div>

            <!-- Right Side: Palette (Fully Scrollable) -->
            <aside class="w-full md:w-72 bg-slate-50 flex flex-col h-48 md:h-full shrink-0">
                <div class="p-3 bg-white border-b shrink-0">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Candidate</p>
                    <p id="usr-display" class="font-bold text-sm text-blue-900 truncate"></p>
                </div>
                <div class="p-2 grid grid-cols-4 gap-1 text-[9px] font-bold bg-white shrink-0">
                    <div class="p-1 border rounded text-center"><span id="stat-a">0</span> Ans</div>
                    <div class="p-1 border rounded text-center"><span id="stat-r">0</span> Rev</div>
                    <div class="p-1 border rounded text-center"><span id="stat-s">0</span> Skip</div>
                    <div class="p-1 border rounded text-center"><span id="stat-l">0</span> Left</div>
                </div>
                <!-- This area will now autofit and scroll -->
                <div class="flex-1 overflow-y-auto p-3 custom-scroll">
                    <div id="palette-grid" class="flex flex-wrap gap-2 justify-start"></div>
                </div>
            </aside>
        </section>

        <!-- Result UI -->
        <section id="result-ui" class="hide absolute inset-0 z-[200] bg-white overflow-y-auto custom-scroll p-6">
            <div class="max-w-lg mx-auto text-center">
                <h1 class="text-2xl font-black uppercase text-[#003366]">Exam Result</h1>
                <div id="res-grade" class="text-8xl font-black my-6 text-orange-500"></div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="p-4 bg-slate-100 rounded-lg"><p class="text-xs uppercase">Score</p><p id="res-score" class="text-xl font-bold"></p></div>
                    <div class="p-4 bg-green-100 rounded-lg"><p class="text-xs uppercase">Correct</p><p id="res-corr" class="text-xl font-bold"></p></div>
                </div>
                <button onclick="location.reload()" class="w-full bg-[#003366] text-white py-4 rounded-xl font-bold uppercase">Restart Test</button>
                <div id="error-analysis" class="mt-8 text-left space-y-3"></div>
            </div>
        </section>

    </main>

    <script>
        let allData = {}, questions = [], userAnswers = {}, markedReview = new Set(), visited = new Set();
        let currentIdx = 0, selectedModCode = "", timerSeconds = 90 * 60, interval;

        function login() {
            let name = document.getElementById('cand-name').value.trim();
            if (!name) return alert("Enter Name");
            document.getElementById('usr-display').textContent = name;
            document.getElementById('login-ui').classList.add('hide');
            document.getElementById('module-ui').classList.remove('hide');
        }

        async function selectMod(code) {
            selectedModCode = code;
            try {
                const res = await fetch('questions.json');
                allData = await res.json();
                document.getElementById('step-1').classList.add('hide');
                document.getElementById('step-2').classList.remove('hide');
            } catch (e) { alert("JSON File missing!"); }
        }

        function startExam(count) {
            questions = allData[selectedModCode].sort(() => 0.5 - Math.random()).slice(0, count);
            document.getElementById('module-ui').classList.add('hide');
            document.getElementById('exam-ui').classList.remove('hide');
            initPalette(); renderQuestion(); startTimer();
        }

        function startTimer() {
            interval = setInterval(() => {
                timerSeconds--;
                let m = Math.floor(timerSeconds/60), s = timerSeconds%60;
                document.getElementById('exam-timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (timerSeconds <= 0) submitExam(true);
            }, 1000);
        }

        function initPalette() {
            const grid = document.getElementById('palette-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.className = `q-btn pal-btn-${i}`;
                btn.textContent = i + 1;
                btn.onclick = () => { currentIdx = i; renderQuestion(); };
                grid.appendChild(btn);
            });
        }

        function renderQuestion() {
            const q = questions[currentIdx]; visited.add(currentIdx);
            document.getElementById('display-mod').textContent = "Paper: " + selectedModCode;
            document.getElementById('display-idx').textContent = `Q: ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('q-text').textContent = q.question;
            
            const container = document.getElementById('opt-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const id = `opt${i}`;
                const div = document.createElement('div');
                div.innerHTML = `<input type="radio" name="option" id="${id}" class="hide opt-input" ${userAnswers[currentIdx] === opt ? 'checked' : ''}>
                    <label for="${id}" class="opt-label text-sm font-medium"><span>${String.fromCharCode(65+i)}.</span><span class="flex-1">${opt}</span></label>`;
                div.querySelector('input').onchange = () => { userAnswers[currentIdx] = opt; markedReview.delete(currentIdx); updateStats(); };
                container.appendChild(div);
            });
            updateStats();
            document.getElementById('next-btn').classList.toggle('hide', currentIdx === questions.length - 1);
            document.getElementById('submit-btn').classList.toggle('hide', currentIdx !== questions.length - 1);
        }

        function updateStats() {
            let ans = 0, rev = 0, skp = 0;
            questions.forEach((_, i) => {
                const btn = document.querySelector(`.pal-btn-${i}`);
                if (!btn) return;
                btn.classList.remove('q-current', 'q-answered', 'q-not-answered', 'q-marked');
                if (i === currentIdx) btn.classList.add('q-current');
                if (userAnswers[i]) { btn.classList.add('q-answered'); ans++; }
                else if (markedReview.has(i)) { btn.classList.add('q-marked'); rev++; }
                else if (visited.has(i)) { btn.classList.add('q-not-answered'); skp++; }
            });
            document.getElementById('stat-a').textContent = ans;
            document.getElementById('stat-r').textContent = rev;
            document.getElementById('stat-s').textContent = skp;
            document.getElementById('stat-l').textContent = questions.length - (ans + rev + skp);
        }

        function move(dir) {
            currentIdx = Math.max(0, Math.min(questions.length - 1, currentIdx + dir));
            renderQuestion();
        }

        function markReview() { markedReview.add(currentIdx); delete userAnswers[currentIdx]; move(1); }

        function submitExam(auto = false) {
            if (!auto && !confirm("Submit Exam?")) return;
            clearInterval(interval);
            document.getElementById('exam-ui').classList.add('hide');
            document.getElementById('result-ui').classList.remove('hide');
            let correct = 0;
            const errBox = document.getElementById('error-analysis');
            errBox.innerHTML = '<h3 class="font-bold border-b pb-2">Analysis:</h3>';

            questions.forEach((q, i) => {
                const u = userAnswers[i] || "Skipped";
                const isCorrect = u === q.answer; if (isCorrect) correct++;
                const div = document.createElement('div');
                div.className = `p-3 rounded border text-xs ${isCorrect ? 'bg-green-50' : 'bg-red-50'}`;
                div.innerHTML = `<b>${i+1}.</b> ${q.question}<br><span class="${isCorrect?'text-green-700':'text-red-700'}">Your: ${u}</span> | <b>Ans: ${q.answer}</b>`;
                errBox.appendChild(div);
            });

            const score = Math.round((correct / questions.length) * 100);
            document.getElementById('res-grade').textContent = score >= 50 ? 'S' : 'F';
            document.getElementById('res-score').textContent = score + "%";
            document.getElementById('res-corr').textContent = correct;
        }
    </script>
</body>
</html>
