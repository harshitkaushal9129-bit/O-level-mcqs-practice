<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIELIT Official CBT - Kaushal Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://harshitkaushal9129-bit.github.io/O-level-mcqs-practice/mcqs.png">
    
    <meta name="theme-color" content="#003366">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * { 
            -webkit-user-select: none; 
            user-select: none; 
            box-sizing: border-box;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- RESPONSIVE LAYOUT CORE --- */
        #exam-ui {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            #exam-ui { flex-direction: row; }
        }

        /* Scrollable Content Area */
        .scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 20px;
            background: #fff;
        }

        /* Sidebar/Palette Adjustments */
        aside {
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e2e8f0;
        }

        @media (max-width: 767px) {
            aside {
                height: 200px; /* Mobile par palette ki height fixed */
                border-top: 2px solid #cbd5e1;
            }
        }

        /* NIELIT Shapes */
        .q-btn { width: 36px; height: 36px; font-size: 12px; font-weight: 700; border: 1px solid #cbd5e1; cursor: pointer; background: #fff; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .q-answered { background: #16a34a !important; color: white !important; clip-path: polygon(0% 20%, 20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%); border: none; }
        .q-not-answered { background: #dc2626 !important; color: white !important; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); border: none; }
        .q-marked { background: #7c3aed !important; color: white !important; border-radius: 50% !important; border: none; }
        .q-current { border: 3px solid #0f172a !important; transform: scale(1.1); z-index: 10; }

        /* Option Styling */
        .opt-label { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; cursor: pointer; display: flex; align-items: center; background: #fff; transition: 0.2s; gap: 12px; width: 100%; }
        .opt-input:checked + .opt-label { background: #eff6ff; border-color: #2563eb; color: #1e40af; }

        .hide { display: none !important; }

        .nav-footer { 
            background: #ffffff; 
            border-top: 2px solid #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 20px; 
            gap: 10px; 
            shrink: 0; 
        }

        .btn-action { padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 6px; color: white; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Header (Hamesha Visible) -->
    <header class="bg-[#003366] text-white p-3 flex justify-between items-center shadow-lg shrink-0 border-b-4 border-orange-500">
        <div class="flex items-center gap-2">
            <img src="https://harshitkaushal9129-bit.github.io/O-level-mcqs-practice/mcqs.png" class="h-8 bg-white p-1 rounded">
            <h1 class="text-xs font-bold uppercase hidden sm:block">NIELIT Official Exam</h1>
        </div>
        <div id="exam-timer" class="bg-black/40 px-4 py-1 rounded-full font-mono text-lg font-bold text-orange-400 border border-white/20">90:00</div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        
        <!-- Login UI -->
        <section id="login-ui" class="absolute inset-0 z-[100] bg-slate-200 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-[#003366] p-6 text-center text-white">
                    <h2 class="text-xl font-bold uppercase">Candidate Login</h2>
                </div>
                <div class="p-6">
                    <input type="text" id="cand-name" class="w-full border-2 p-3 rounded-xl mb-4 outline-none focus:border-blue-600" placeholder="Enter Full Name">
                    <button onclick="login()" class="w-full bg-[#ff9933] text-white py-3 rounded-xl font-bold uppercase shadow-lg">Start Exam</button>
                    <p class="text-[10px] text-center text-slate-400 mt-4 uppercase">© 2026 Kaushal Institute IT Cell</p>
                </div>
            </div>
        </section>

        <!-- Module Selection -->
        <section id="module-ui" class="hide absolute inset-0 z-[90] bg-slate-100 p-4 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border-b-4 border-blue-900">
                    <h2 class="text-xl font-black text-slate-800 uppercase">Select Paper</h2>
                </div>
                <div id="step-1" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onclick="selectMod('M1')" class="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent hover:border-blue-600 text-left">
                        <span class="block font-bold text-lg">M1-R5</span>
                        <span class="text-xs text-slate-500">IT Tools & Network Basics</span>
                    </button>
                    <button onclick="selectMod('M2')" class="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent hover:border-green-600 text-left">
                        <span class="block font-bold text-lg">M2-R5</span>
                        <span class="text-xs text-slate-500">Web Designing</span>
                    </button>
                    <button onclick="selectMod('M3')" class="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent hover:border-yellow-600 text-left">
                        <span class="block font-bold text-lg">M3-R5</span>
                        <span class="text-xs text-slate-500">Python Programming</span>
                    </button>
                    <button onclick="selectMod('M4')" class="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent hover:border-purple-600 text-left">
                        <span class="block font-bold text-lg">M4-R5</span>
                        <span class="text-xs text-slate-500">Internet of Things (IoT)</span>
                    </button>
                </div>
                <div id="step-2" class="hide bg-white p-6 rounded-xl shadow-xl mt-4 text-center">
                    <p class="font-bold mb-4">Total Questions</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <button onclick="startExam(25)" class="px-6 py-2 border-2 rounded-lg font-bold hover:bg-blue-50">25</button>
                        <button onclick="startExam(50)" class="px-6 py-2 border-2 rounded-lg font-bold hover:bg-blue-50">50</button>
                        <button onclick="startExam(100)" class="px-6 py-2 border-2 rounded-lg font-bold hover:bg-blue-50">100</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Examination CBT Interface -->
        <section id="exam-ui" class="hide">
            <!-- Left Side: Question area -->
            <div class="flex-1 flex flex-col min-h-0">
                <div class="bg-slate-50 px-4 py-2 text-[10px] font-bold text-slate-500 flex justify-between border-b shrink-0">
                    <span id="display-mod"></span> 
                    <span id="display-idx"></span>
                </div>
                
                <div class="scroll-area">
                    <div class="max-w-3xl mx-auto">
                        <h2 id="q-text" class="text-lg md:text-xl font-bold text-slate-800 mb-6 leading-snug"></h2>
                        <div id="opt-container" class="space-y-3"></div>
                    </div>
                </div>

                <footer class="nav-footer">
                    <div class="flex gap-2">
                        <button onclick="move(-1)" class="btn-action bg-slate-500"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="markReview()" class="btn-action bg-purple-600">Review</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="move(1)" id="next-btn" class="btn-action bg-green-600">Save & Next</button>
                        <button onclick="submitExam()" id="submit-btn" class="hide btn-action bg-red-600">Submit</button>
                    </div>
                </footer>
            </div>

            <!-- Right Side: Palette area -->
            <aside class="w-full md:w-72 shrink-0">
                <div class="p-3 bg-white border-b flex justify-between items-center shrink-0">
                    <p id="usr-display" class="font-bold text-blue-900 text-xs truncate"></p>
                    <span class="text-green-600 text-[10px] font-bold animate-pulse">● LIVE</span>
                </div>
                <div class="flex-1 overflow-y-auto p-4">
                    <div id="palette-grid" class="flex flex-wrap gap-2 justify-center"></div>
                </div>
            </aside>
        </section>

        <!-- Result UI -->
        <section id="result-ui" class="hide absolute inset-0 z-[200] bg-white overflow-y-auto p-4">
            <div class="max-w-2xl mx-auto text-center">
                <div class="bg-[#003366] text-white p-8 rounded-3xl mb-6 shadow-xl">
                    <h1 class="text-xl font-bold uppercase opacity-80">Grade</h1>
                    <p id="res-grade" class="text-7xl font-black my-2"></p>
                    <p id="res-score" class="text-xl font-bold"></p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-green-50 p-4 rounded-xl border-b-4 border-green-500">
                        <p class="text-xs font-bold text-green-600 uppercase">Correct</p>
                        <p id="res-corr" class="text-2xl font-black"></p>
                    </div>
                    <div class="bg-red-50 p-4 rounded-xl border-b-4 border-red-500">
                        <p class="text-xs font-bold text-red-600 uppercase">Wrong</p>
                        <p id="res-wrng" class="text-2xl font-black"></p>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full bg-[#003366] text-white py-4 rounded-xl font-bold uppercase">Re-Take Test</button>
                <div id="error-analysis" class="mt-8 space-y-4 text-left"></div>
            </div>
        </section>
    </main>

    <script>
        // Security
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode))) return false;
        };

        let allData = {}, questions = [], userAnswers = {}, markedReview = new Set(), visited = new Set();
        let currentIdx = 0, candidateName = "", selectedModCode = "", timerSeconds = 90 * 60, interval;

        function login() {
            candidateName = document.getElementById('cand-name').value.trim();
            if (candidateName.length < 2) return alert("Enter Name");
            document.getElementById('usr-display').textContent = candidateName;
            document.getElementById('login-ui').classList.add('hide');
            document.getElementById('module-ui').classList.remove('hide');
        }

        async function selectMod(code) {
            selectedModCode = code;
            try {
                const res = await fetch('questions.json');
                allData = await res.json();
                document.getElementById('step-1').classList.add('hide');
                document.getElementById('step-2').classList.remove('hide');
            } catch (e) { alert("Error loading questions.json"); }
        }

        function startExam(count) {
            questions = allData[selectedModCode].sort(() => 0.5 - Math.random()).slice(0, count);
            document.getElementById('module-ui').classList.add('hide');
            document.getElementById('exam-ui').classList.remove('hide');
            initPalette();
            renderQuestion();
            startTimer();
        }

        function startTimer() {
            interval = setInterval(() => {
                timerSeconds--;
                let m = Math.floor(timerSeconds / 60), s = timerSeconds % 60;
                document.getElementById('exam-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
                if (timerSeconds <= 0) submitExam(true);
            }, 1000);
        }

        function initPalette() {
            const grid = document.getElementById('palette-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.className = `q-btn pal-btn-${i}`;
                btn.textContent = i + 1;
                btn.onclick = () => { currentIdx = i; renderQuestion(); };
                grid.appendChild(btn);
            });
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            visited.add(currentIdx);
            document.getElementById('display-mod').textContent = "Module: " + selectedModCode;
            document.getElementById('display-idx').textContent = `Q: ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('q-text').textContent = q.question;
            
            const container = document.getElementById('opt-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const optId = `opt-${i}`;
                const div = document.createElement('div');
                div.innerHTML = `
                    <input type="radio" name="option" id="${optId}" class="hide opt-input" ${userAnswers[currentIdx] === opt ? 'checked' : ''}>
                    <label for="${optId}" class="opt-label">
                        <span class="w-6 h-6 shrink-0 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold border">${String.fromCharCode(65+i)}</span>
                        <span class="text-sm font-semibold">${opt}</span>
                    </label>
                `;
                div.querySelector('input').onchange = () => { 
                    userAnswers[currentIdx] = opt; 
                    markedReview.delete(currentIdx);
                    updateStats(); 
                };
                container.appendChild(div);
            });
            updateStats();
            document.getElementById('next-btn').classList.toggle('hide', currentIdx === questions.length - 1);
            document.getElementById('submit-btn').classList.toggle('hide', currentIdx !== questions.length - 1);
        }

        function updateStats() {
            questions.forEach((_, i) => {
                const btn = document.querySelector(`.pal-btn-${i}`);
                if (!btn) return;
                btn.classList.remove('q-current', 'q-answered', 'q-not-answered', 'q-marked');
                if (i === currentIdx) btn.classList.add('q-current');
                if (userAnswers[i]) btn.classList.add('q-answered');
                else if (markedReview.has(i)) btn.classList.add('q-marked');
                else if (visited.has(i)) btn.classList.add('q-not-answered');
            });
        }

        function move(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) {
                currentIdx = next;
                renderQuestion();
            }
        }

        function markReview() {
            markedReview.add(currentIdx);
            delete userAnswers[currentIdx];
            move(1);
        }

        function submitExam(auto = false) {
            if (!auto && !confirm("Submit Exam?")) return;
            clearInterval(interval);
            document.getElementById('exam-ui').classList.add('hide');
            document.getElementById('result-ui').classList.remove('hide');

            let correct = 0;
            const errBox = document.getElementById('error-analysis');
            errBox.innerHTML = '<h3 class="font-bold border-b pb-2 mb-4">Review Your Answers:</h3>';

            questions.forEach((q, i) => {
                const u = userAnswers[i] || "Skipped";
                const isCorrect = u === q.answer;
                if (isCorrect) correct++;
                
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border-l-4 mb-3 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`;
                div.innerHTML = `<p class="font-bold text-sm mb-1">${i+1}. ${q.question}</p>
                                 <p class="text-xs">Your: ${u} | Correct: ${q.answer}</p>`;
                errBox.appendChild(div);
            });

            let score = Math.round((correct / questions.length) * 100);
            let grade = score >= 50 ? (score >= 85 ? 'S' : (score >= 75 ? 'A' : (score >= 65 ? 'B' : (score >= 55 ? 'C' : 'D')))) : 'F';
            
            document.getElementById('res-grade').textContent = grade;
            document.getElementById('res-score').textContent = score + "% Score";
            document.getElementById('res-corr').textContent = correct;
            document.getElementById('res-wrng').textContent = questions.length - correct;
        }
    </script>
</body>
</html>
